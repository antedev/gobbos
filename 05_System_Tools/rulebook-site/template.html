<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <meta name="description" content="Gobbos — A Roguelite Tactical Skirmish RPG for Goblins. {{SUBTITLE}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== Top Header Bar ===== -->
  <header class="top-bar">
    <div class="top-bar-left">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <a href="index.html" class="logo">
        <span class="logo-icon">👺</span>
        <span class="logo-text">Gobbos</span>
      </a>
    </div>
    <nav class="env-nav" id="envNav">
      {{ENV_NAV}}
    </nav>
    <div class="top-bar-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="theme-icon theme-icon--light">☀️</span>
        <span class="theme-icon theme-icon--dark">🌙</span>
      </button>
    </div>
  </header>

  <!-- ===== Layout Wrapper ===== -->
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">{{PAGE_TITLE}}</h2>
        <p class="sidebar-subtitle">{{SUBTITLE}}</p>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        {{NAV_CONTENT}}
      </nav>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      {{MAIN_CONTENT}}
    </main>
  </div>

  <!-- ===== Scroll-to-top Button ===== -->
  <button class="scroll-top" id="scrollTop" aria-label="Scroll to top" title="Back to top">↑</button>

  <!-- ===== Scripts ===== -->
  <script>
    // --- Theme Toggle ---
    (function() {
      const toggle = document.getElementById('themeToggle');
      const html = document.documentElement;
      const stored = localStorage.getItem('gobbos-theme');
      if (stored) html.setAttribute('data-theme', stored);

      toggle.addEventListener('click', () => {
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('gobbos-theme', next);
      });
    })();

    // --- Sidebar Toggle (Mobile) ---
    (function() {
      const btn = document.getElementById('sidebarToggle');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');

      function closeSidebar() {
        sidebar.classList.remove('sidebar--open');
        overlay.classList.remove('sidebar-overlay--visible');
      }

      btn.addEventListener('click', () => {
        const isOpen = sidebar.classList.toggle('sidebar--open');
        overlay.classList.toggle('sidebar-overlay--visible', isOpen);
      });

      overlay.addEventListener('click', closeSidebar);

      // Close sidebar when clicking a nav link on mobile
      sidebar.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          if (window.innerWidth < 900) closeSidebar();
        });
      });
    })();

    // --- Sidebar Collapse Toggle ---
    document.querySelectorAll('.nav-group-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const expanded = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', String(!expanded));
        const targetId = 'nav-' + btn.getAttribute('data-target');
        const list = document.getElementById(targetId);
        if (list) list.style.display = expanded ? 'none' : '';
        btn.querySelector('.toggle-icon').textContent = expanded ? '▸' : '▾';
      });
    });

    // --- Scroll Spy ---
    (function() {
      const links = document.querySelectorAll('.nav-link');
      const anchors = [];
      links.forEach(link => {
        const id = link.getAttribute('data-target');
        const el = document.getElementById(id);
        if (el) anchors.push({ el, link });
      });

      function updateActive() {
        let current = null;
        for (const item of anchors) {
          const rect = item.el.getBoundingClientRect();
          if (rect.top <= 120) current = item;
        }
        links.forEach(l => l.classList.remove('nav-link--active'));
        if (current) current.link.classList.add('nav-link--active');
      }

      window.addEventListener('scroll', updateActive, { passive: true });
      updateActive();
    })();

    // --- Scroll to Top ---
    (function() {
      const btn = document.getElementById('scrollTop');
      window.addEventListener('scroll', () => {
        btn.classList.toggle('scroll-top--visible', window.scrollY > 400);
      }, { passive: true });
      btn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();
  </script>

</body>
</html>
